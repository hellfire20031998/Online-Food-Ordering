spring.application.name=Online-Food-Ordering

# Common JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Database configuration (override via environment variables or profile-specific files)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/my_restaurant}
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Logging (can be tuned per profile)
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

